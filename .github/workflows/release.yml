name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-beta.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  SOFTWARE_CENTER_REPO: furss123/hyot-software-center

jobs:
  build-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = 'v0.0.0' }
          $version = $tag -replace '^v', ''
          $channel = if ($version -match '-beta') { 'beta' } else { 'stable' }
          "version=$version" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore HyoPDF.sln

      - name: Publish win-x64
        shell: pwsh
        run: ./build/scripts/Publish-App.ps1 -Runtime win-x64 -Version ${{ steps.version.outputs.version }}

      - name: Install Python dependencies for assets
        run: pip install pillow

      - name: Prepare installer assets
        shell: pwsh
        run: ./build/scripts/Prepare-Assets.ps1

      - name: Install Inno Setup
        run: choco install innosetup --version=6.2.2 -y

      - name: Build MSI (x64)
        shell: pwsh
        run: ./build/scripts/Build-Installer.ps1 -Arch x64 -Version ${{ steps.version.outputs.version }}

      - name: Build Inno Setup installer (x64)
        shell: pwsh
        run: ./build/scripts/Build-InnoSetup.ps1 -Version ${{ steps.version.outputs.version }}

      - name: Generate SHA256
        shell: pwsh
        run: ./build/scripts/Generate-Checksums.ps1 -Version ${{ steps.version.outputs.version }} -Arch x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyopdf-x64
          path: |
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-x64.exe
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-x64.msi
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-Setup.exe
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-x64.exe.sha256
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-x64.msi.sha256
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-Setup.exe.sha256
          retention-days: 0

  build-arm64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = 'v0.0.0' }
          $version = $tag -replace '^v', ''
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore HyoPDF.sln

      - name: Publish win-arm64
        shell: pwsh
        run: ./build/scripts/Publish-App.ps1 -Runtime win-arm64 -Version ${{ steps.version.outputs.version }}

      - name: Build MSI (arm64)
        shell: pwsh
        run: ./build/scripts/Build-Installer.ps1 -Arch arm64 -Version ${{ steps.version.outputs.version }}

      - name: Generate SHA256
        shell: pwsh
        run: ./build/scripts/Generate-Checksums.ps1 -Version ${{ steps.version.outputs.version }} -Arch arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyopdf-arm64
          path: |
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-arm64.exe
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-arm64.msi
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-arm64.exe.sha256
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-arm64.msi.sha256
          retention-days: 0

  release:
    needs: [build-x64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$TAG" ]; then TAG="v0.0.0"; fi
          VERSION="${TAG#v}"
          if echo "$VERSION" | grep -q '\-beta'; then CHANNEL="beta"; else CHANNEL="stable"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: HyoPDF ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-x64.exe
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-x64.msi
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-Setup.exe
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-x64.exe.sha256
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-x64.msi.sha256
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-Setup.exe.sha256
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-arm64.exe
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-arm64.msi
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-arm64.exe.sha256
            artifacts/HyoPDF-${{ steps.version.outputs.version }}-arm64.msi.sha256

      - name: Build software center payload
        id: payload
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHANNEL: ${{ steps.version.outputs.channel }}
          TAG: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          $repo = $env:REPO
          $version = $env:VERSION
          $tag = $env:TAG
          $baseUrl = "https://github.com/$repo/releases/download/$tag"
          function Read-Hash([string]$path) {
            if (-not (Test-Path $path)) { return '' }
            return (Get-Content $path -Raw).Split(' ')[0].Trim()
          }
          function New-Asset([string]$type, [string]$arch, [string]$filename) {
            $path = Join-Path 'artifacts' $filename
            $size = if (Test-Path $path) { (Get-Item $path).Length } else { 0 }
            [ordered]@{
              type = $type
              arch = $arch
              filename = $filename
              url = "$baseUrl/$filename"
              size = $size
              sha256 = Read-Hash "$path.sha256"
              downloadCount = 0
            }
          }
          $assets = @(
            (New-Asset 'portable' 'x64' "HyoPDF-$version-x64.exe"),
            (New-Asset 'installer' 'x64' "HyoPDF-$version-x64.msi"),
            (New-Asset 'installer' 'x64' "HyoPDF-$version-Setup.exe"),
            (New-Asset 'portable' 'arm64' "HyoPDF-$version-arm64.exe"),
            (New-Asset 'installer' 'arm64' "HyoPDF-$version-arm64.msi")
          )
          $payload = [ordered]@{
            version = $version
            channel = $env:CHANNEL
            releaseDate = (Get-Date).ToString('yyyy-MM-dd')
            githubTag = $tag
            assets = $assets
          } | ConvertTo-Json -Depth 6 -Compress
          "payload=$payload" >> $env:GITHUB_OUTPUT

      - name: Update software center
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SOFTWARE_CENTER_PAT }}
          repository: ${{ env.SOFTWARE_CENTER_REPO }}
          event-type: hyopdf-release
          client-payload: ${{ steps.payload.outputs.payload }}
